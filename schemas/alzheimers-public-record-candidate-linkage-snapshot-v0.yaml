$schema: "http://json-schema.org/draft-07/schema#"
title: Alzheimer's Public Record Candidate Linkage Snapshot v0
type: object
additionalProperties: false
required:
  - snapshot_id
  - generated_from_dataset_id
  - exact_linkage_snapshot_id
  - tracked_intervention_count
  - candidate_cluster_count
  - candidate_link_count
  - candidate_clusters
  - repo_paths
properties:
  snapshot_id:
    type: string
    minLength: 1
  generated_from_dataset_id:
    type: string
    minLength: 1
  exact_linkage_snapshot_id:
    type: string
    minLength: 1
  tracked_intervention_count:
    type: integer
    minimum: 0
  candidate_cluster_count:
    type: integer
    minimum: 0
  candidate_link_count:
    type: integer
    minimum: 0
  candidate_clusters:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - canonical_entity_name
        - intervention_family
        - disease_scope
        - off_patent_status
        - source_mode
        - alias_terms
        - exact_anchor_present
        - candidate_link_count
        - source_systems
        - candidate_links
      properties:
        canonical_entity_name:
          type: string
          minLength: 1
        intervention_family:
          type: string
          minLength: 1
        disease_scope:
          type: string
          minLength: 1
        off_patent_status:
          type: string
          minLength: 1
        source_mode:
          type: string
          minLength: 1
        alias_terms:
          type: array
          items:
            type: string
            minLength: 1
        exact_anchor_present:
          type: boolean
        candidate_link_count:
          type: integer
          minimum: 0
        source_systems:
          type: array
          items:
            type: string
            minLength: 1
        candidate_links:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - record_id
              - source_system
              - evidence_role
              - record_title
              - intervention_or_assay_type
              - disease_scope
              - candidate_score
              - candidate_tier
              - score_components
            properties:
              record_id:
                type: string
                minLength: 1
              source_system:
                type: string
                minLength: 1
              evidence_role:
                type: string
                minLength: 1
              record_title:
                type: string
                minLength: 1
              intervention_or_assay_type:
                type: string
                minLength: 1
              disease_scope:
                type: string
                minLength: 1
              candidate_score:
                type: number
                minimum: 0
                maximum: 1
              candidate_tier:
                type: string
                enum:
                  - high
                  - medium
                  - low
              score_components:
                type: array
                minItems: 1
                items:
                  type: string
                  minLength: 1
  repo_paths:
    type: object
    additionalProperties: false
    required:
      - seed_json
      - exact_linkage_snapshot
      - query_manifest
      - candidate_linkage_snapshot
    properties:
      seed_json:
        type: string
        minLength: 1
      exact_linkage_snapshot:
        type: string
        minLength: 1
      query_manifest:
        type: string
        minLength: 1
      candidate_linkage_snapshot:
        type: string
        minLength: 1
