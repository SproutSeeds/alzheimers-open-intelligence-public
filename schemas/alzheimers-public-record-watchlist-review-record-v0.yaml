$schema: "http://json-schema.org/draft-07/schema#"
title: Alzheimer's Public Record Watchlist Review Record v0
type: object
additionalProperties: false
required:
  - review_id
  - generated_from_dataset_id
  - candidate_review_snapshot_id
  - canonical_entity_name
  - review_status
  - watchlist_category
  - decision_confidence
  - decision_summary
  - intervention_family
  - disease_scope
  - off_patent_status
  - source_systems
  - evidence_roles
  - support_status
  - exact_scope_link_count
  - exact_scope_source_systems
  - exact_scope_evidence_roles
  - exemplar_record_id
  - exemplar_record_title
  - current_candidate_record_count
  - current_candidate_record_ids
  - review_flags
  - caution_flags
  - rationale_points
  - next_actions
  - repo_paths
properties:
  review_id:
    type: string
    minLength: 1
  generated_from_dataset_id:
    type: string
    minLength: 1
  candidate_review_snapshot_id:
    type: string
    minLength: 1
  canonical_entity_name:
    type: string
    minLength: 1
  review_status:
    type: string
    enum:
      - completed
  watchlist_category:
    type: string
    enum:
      - needs_second_source
      - adjacent_scope_only
      - unresolved_candidate
  decision_confidence:
    type: string
    enum:
      - high
      - medium
      - low
  decision_summary:
    type: string
    minLength: 1
  intervention_family:
    type: string
    minLength: 1
  disease_scope:
    type: string
    minLength: 1
  off_patent_status:
    type: string
    minLength: 1
  source_systems:
    type: array
    items:
      type: string
      minLength: 1
  evidence_roles:
    type: array
    items:
      type: string
      minLength: 1
  support_status:
    type: string
    minLength: 1
  exact_scope_link_count:
    type: integer
    minimum: 0
  exact_scope_source_systems:
    type: array
    items:
      type: string
      minLength: 1
  exact_scope_evidence_roles:
    type: array
    items:
      type: string
      minLength: 1
  exemplar_record_id:
    type: string
    minLength: 1
  exemplar_record_title:
    type: string
    minLength: 1
  current_candidate_record_count:
    type: integer
    minimum: 0
  current_candidate_record_ids:
    type: array
    items:
      type: string
      minLength: 1
  review_flags:
    type: array
    items:
      type: string
      minLength: 1
  caution_flags:
    type: array
    items:
      type: string
      minLength: 1
  rationale_points:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  next_actions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  repo_paths:
    type: object
    additionalProperties: false
    required:
      - review_record
      - review_report
      - candidate_review_snapshot
    properties:
      review_record:
        type: string
        minLength: 1
      review_report:
        type: string
        minLength: 1
      candidate_review_snapshot:
        type: string
        minLength: 1
