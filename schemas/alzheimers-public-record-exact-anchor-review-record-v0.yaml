$schema: "http://json-schema.org/draft-07/schema#"
title: Alzheimer's Public Record Exact Anchor Review Record v0
type: object
additionalProperties: false
required:
  - review_id
  - generated_from_dataset_id
  - promotion_snapshot_id
  - candidate_review_snapshot_id
  - canonical_entity_name
  - review_status
  - review_outcome
  - decision_confidence
  - decision_summary
  - intervention_family
  - disease_scope
  - off_patent_status
  - source_systems
  - evidence_roles
  - support_status
  - exemplar_record_id
  - exemplar_record_title
  - qualifying_support_record_count
  - qualifying_support_source_count
  - qualifying_support_record_ids
  - nonqualifying_related_record_count
  - nonqualifying_related_records
  - caution_flags
  - rationale_points
  - next_actions
  - repo_paths
properties:
  review_id:
    type: string
    minLength: 1
  generated_from_dataset_id:
    type: string
    minLength: 1
  promotion_snapshot_id:
    type: string
    minLength: 1
  candidate_review_snapshot_id:
    type: string
    minLength: 1
  canonical_entity_name:
    type: string
    minLength: 1
  review_status:
    type: string
    enum:
      - completed
  review_outcome:
    type: string
    enum:
      - promote_to_exact_anchor
      - defer_from_exact_anchor
      - reject_from_exact_anchor
  decision_confidence:
    type: string
    enum:
      - high
      - medium
      - low
  decision_summary:
    type: string
    minLength: 1
  intervention_family:
    type: string
    minLength: 1
  disease_scope:
    type: string
    minLength: 1
  off_patent_status:
    type: string
    minLength: 1
  source_systems:
    type: array
    items:
      type: string
      minLength: 1
  evidence_roles:
    type: array
    items:
      type: string
      minLength: 1
  support_status:
    type: string
    minLength: 1
  exemplar_record_id:
    type: string
    minLength: 1
  exemplar_record_title:
    type: string
    minLength: 1
  qualifying_support_record_count:
    type: integer
    minimum: 0
  qualifying_support_source_count:
    type: integer
    minimum: 0
  qualifying_support_record_ids:
    type: array
    items:
      type: string
      minLength: 1
  nonqualifying_related_record_count:
    type: integer
    minimum: 0
  nonqualifying_related_records:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - record_id
        - source_system
        - evidence_role
        - exclusion_reason
      properties:
        record_id:
          type: string
          minLength: 1
        source_system:
          type: string
          minLength: 1
        evidence_role:
          type: string
          minLength: 1
        exclusion_reason:
          type: string
          minLength: 1
  caution_flags:
    type: array
    items:
      type: string
      minLength: 1
  rationale_points:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  next_actions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  repo_paths:
    type: object
    additionalProperties: false
    required:
      - review_record
      - review_report
      - promotion_snapshot
      - candidate_review_snapshot
    properties:
      review_record:
        type: string
        minLength: 1
      review_report:
        type: string
        minLength: 1
      promotion_snapshot:
        type: string
        minLength: 1
      candidate_review_snapshot:
        type: string
        minLength: 1
