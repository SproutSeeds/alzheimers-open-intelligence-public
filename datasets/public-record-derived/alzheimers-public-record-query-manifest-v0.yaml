source_queries:
  clinicaltrials_gov:
    enabled: true
    query_strategy: condition_and_intervention_surface
    candidate_follow_on_per_intervention_max: 2
    focus_fields:
      - condition
      - interventionName
      - primaryOutcomeMeasure
      - overallStatus
      - phase
      - leadSponsorName
  pubmed:
    enabled: true
    query_strategy: mesh_and_keyword_boolean_search
    candidate_follow_on_per_intervention_max: 2
    seed_query: '("Alzheimer Disease"[MeSH Terms] OR "Mild Cognitive Impairment"[MeSH Terms]) AND (trial OR biomarker OR intervention OR treatment)'
  pmc_open_access_subset:
    enabled: true
    query_strategy: oa_subset_follow_on_from_pubmed
    seed_filter: 'pubmed pmc open access[filter]'
  nih_reporter:
    enabled: true
    query_strategy: advanced_text_and_publication_linkage
    publication_link_sample_limit_per_core_project: 3
    seed_terms:
      - Alzheimer disease
      - Alzheimer's disease
      - dementia
      - mild cognitive impairment
  openfda:
    enabled: true
    query_strategy: label_and_safety_context
    focus_endpoints:
      - drug/label
      - drug/event
    top_reaction_limit: 2
    seed_interventions:
      - canonical_entity_name: Donepezil
        label_query: 'openfda.generic_name:"donepezil"'
        event_search_term: donepezil
        disease_scope: alzheimers_disease
        off_patent_status: off_patent
      - canonical_entity_name: Memantine
        label_query: 'openfda.generic_name:"memantine"'
        event_search_term: memantine
        disease_scope: alzheimers_disease
        off_patent_status: off_patent
      - canonical_entity_name: Rivastigmine
        label_query: 'openfda.generic_name:"rivastigmine"'
        event_search_term: rivastigmine
        disease_scope: alzheimers_disease
        off_patent_status: off_patent
      - canonical_entity_name: Galantamine
        label_query: 'openfda.generic_name:"galantamine"'
        event_search_term: galantamine
        disease_scope: alzheimers_disease
        off_patent_status: off_patent
      - canonical_entity_name: Lecanemab
        label_query: 'openfda.generic_name:"lecanemab"'
        event_search_term: lecanemab
        disease_scope: mild_cognitive_impairment
        off_patent_status: on_patent_or_proprietary
      - canonical_entity_name: Donanemab
        label_query: 'openfda.generic_name:"donanemab"'
        event_search_term: donanemab
        disease_scope: mild_cognitive_impairment
        off_patent_status: on_patent_or_proprietary
      - canonical_entity_name: Brexpiprazole
        label_query: 'openfda.generic_name:"brexpiprazole"'
        event_search_term: brexpiprazole
        disease_scope: alzheimers_disease
        off_patent_status: on_patent_or_proprietary
